version: "3.11"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbanpulse
      POSTGRES_USER: urbanpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urbanpulse_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Alembic migrations (runs once, then exits) ───────────────────────────────
  migrate:
    build:
      context: .
      target: source
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://urbanpulse:${POSTGRES_PASSWORD:-urbanpulse_dev}@postgres:5432/urbanpulse
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://urbanpulse:${POSTGRES_PASSWORD:-urbanpulse_dev}@postgres:5432/urbanpulse
      REDIS_URL: redis://redis:6379/0
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme-in-production}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Streamlit dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      target: dashboard
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
